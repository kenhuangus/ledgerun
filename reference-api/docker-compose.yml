services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ctref
      POSTGRES_PASSWORD: ctref
      POSTGRES_DB: ctref
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctref -d ctref"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ctref:ctref@db:5432/ctref
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
