# One `docker compose up` brings up the whole stack (architecture.md §9):
#   reference-db (:5433)  reference-api (:8000)  app-db (:5432)
#   mcp-server            app (:3000)
#
# The reference-* service blocks are copied (not `include`d) from
# reference-api/docker-compose.yml so we can rename them and avoid the bare `db`
# service-name / port collision with our own app-db. Behavior is identical:
# reference Postgres on host :5433, reference FastAPI on :8000.

services:
  reference-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ctref
      POSTGRES_PASSWORD: ctref
      POSTGRES_DB: ctref
    ports:
      - "5433:5432"
    volumes:
      - reference_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctref -d ctref"]
      interval: 2s
      timeout: 5s
      retries: 10

  reference-api:
    build:
      context: ./reference-api/services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ctref:ctref@reference-db:5432/ctref
    depends_on:
      reference-db:
        condition: service_healthy

  app-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ledgerun
      POSTGRES_PASSWORD: ledgerun
      POSTGRES_DB: ledgerun
    ports:
      - "5434:5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerun -d ledgerun"]
      interval: 2s
      timeout: 5s
      retries: 10

  # NOTE: there is no standalone MCP-server container. The MCP server speaks the
  # stdio transport, so it is spawned as a child of whatever process needs it
  # (e.g. `npm run demo`, which uses MCP_TRANSPORT=stdio). The app container uses
  # the in-process DirectMcpClient, which calls the exact same MCP tool functions.
  # Run the server standalone for inspection with `npm run mcp`.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Push the Prisma schema to app-db on boot, then start — makes `docker compose
    # up` turnkey (no manual migration step on a fresh volume).
    command: ["sh", "-c", "npx prisma db push --skip-generate --accept-data-loss && npm run start"]
    environment:
      DATABASE_URL: postgresql://ledgerun:ledgerun@app-db:5432/ledgerun?schema=public
      REFERENCE_API_URL: http://reference-api:8000
      # Unset transport -> in-process DirectMcpClient (same MCP tools, no child spawn).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
    ports:
      # Host 3000 is commonly taken; publish the app on 3100 -> container 3000.
      - "3100:3000"
    depends_on:
      app-db:
        condition: service_healthy
      reference-api:
        condition: service_started

volumes:
  reference_postgres_data:
  app_postgres_data:
